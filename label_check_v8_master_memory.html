<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>標籤檢核 V7.4 穩定版（7項）</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}
.wrap{max-width:1150px;margin:0 auto;padding:10px}
h2{margin:8px 0}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:900px){.row{grid-template-columns:1fr}}
label{display:block;font-size:13px;font-weight:bold;margin-bottom:6px}
select,input,textarea,button{font:inherit}
select,input,textarea{width:100%;padding:10px;border:none;border-radius:10px}
textarea{min-height:190px;resize:vertical}
button{padding:11px 14px;border:none;border-radius:10px;background:#2563eb;color:#fff;margin-right:8px;margin-top:8px;cursor:pointer}
button.ghost{background:#475569}
.panel{background:#1e293b;border-radius:14px;padding:12px;margin-top:12px}
.status{padding:12px;border-radius:10px;margin-top:10px;font-weight:bold;white-space:pre-wrap}
.ok{background:#16a34a}
.ng{background:#dc2626}
.warn{background:#ca8a04}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px;background:#111827;border-radius:10px;overflow:hidden}
th,td{border-bottom:1px solid #334155;padding:8px;text-align:left;vertical-align:top}
th{background:#1f2937}
.mono{font-family:Consolas,monospace}
.small{font-size:12px;color:#cbd5e1;line-height:1.7}
.badge{display:inline-block;background:#334155;color:#fff;padding:2px 8px;border-radius:999px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <h2>📋 標籤檢核 V7.4（穩定版，7項）</h2>

  <div class="panel">
    <div class="small">
      使用方式：<br>
      1. 第一次先載入 Excel 主檔（工作頁：商品資料），之後程式會自動記住。<br>
      2. 選類別、品名、配別。<br>
      3. 用 Google Lens / iPhone 掃描文字，複製後貼到下方。<br>
      4. 條碼另外輸入或貼上掃描結果。<br>
      5. 按「開始比對」，系統會比對：品名、條碼、熱量、售價、製造日期、有效日期、有效時間。<br>
    </div>
  </div>

  <div class="row">
    <div>
      <label for="excelInput">Excel 主檔</label>
      <input type="file" id="excelInput" accept=".xlsx,.xls">
    </div>
    <div>
      <label>主檔狀態</label>
      <div><span id="excelStatus" class="badge">未載入</span></div><div class="small" id="excelInfo"></div>
    </div>
    <div>
      <label>目前列資料</label>
      <div><span id="rowStatus" class="badge">未選擇</span></div>
    </div>
  </div>

  <div class="row" style="margin-top:10px">
    <div>
      <label for="category">類別</label>
      <select id="category"></select>
    </div>
    <div>
      <label for="product">品名</label>
      <select id="product"></select>
    </div>
    <div>
      <label for="delivery">配別</label>
      <select id="delivery">
        <option value="一配">一配</option>
        <option value="二配">二配</option>
      </select>
    </div>
  </div>

  <div class="row" style="margin-top:10px">
    <div>
      <label for="barcodeInput">條碼輸入</label>
      <input id="barcodeInput" type="text" placeholder="貼上掃描到的 13 碼條碼">
    </div>
    <div style="grid-column:span 2;">
      <label for="lensText">Google Lens / iPhone 掃描文字貼上區</label>
      <textarea id="lensText" placeholder="請把掃描到的標籤文字貼在這裡"></textarea>
    </div>
  </div>

  <div class="panel">
    <button id="btnCompare">開始比對</button>
    <button id="btnDemo" class="ghost">載入示範文字</button>
    <button id="btnClearText" class="ghost">清除貼上文字</button>
    <button id="btnSaveResult" class="ghost">儲存結果</button>
    <button id="btnExportCsv" class="ghost">匯出 CSV</button>
    <button id="btnClearMaster" class="ghost">清除主檔快取</button>
  </div>

  <div id="status" class="status warn">請先載入 Excel 主檔。</div>

  <div class="panel">
    <div><b>Excel 帶出的標準值</b></div>
    <div id="expectedSummary" class="small"></div>
  </div>

  <div class="panel">
    <div><b>比對結果</b></div>
    <table>
      <thead><tr><th>欄位</th><th>辨識值</th><th>預期值</th><th>結果</th></tr></thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>

  <div class="panel">
    <div><b>解析明細</b></div>
    <div id="parseDetail" class="mono small"></div>
  </div>
</div>

<script>
let masterRows = [];
const RESULT_STORAGE_KEY = "label_check_v74_results";
const MASTER_STORAGE_KEY = "label_check_v8_master_rows";
const MASTER_INFO_KEY = "label_check_v8_master_info";
let lastResult = null;

function qs(id){ return document.getElementById(id); }

function init(){
  qs("excelInput").addEventListener("change", loadExcel);
  qs("category").addEventListener("change", updateProducts);
  qs("product").addEventListener("change", renderExpected);
  qs("delivery").addEventListener("change", renderExpected);
  qs("btnCompare").addEventListener("click", compareText);
  qs("btnDemo").addEventListener("click", loadDemo);
  qs("btnClearText").addEventListener("click", clearLensText);
  qs("btnSaveResult").addEventListener("click", saveResult);
  qs("btnExportCsv").addEventListener("click", exportCsv);
  qs("btnClearMaster").addEventListener("click", clearMasterCache);
  loadHistory();
  loadCachedMaster();
}

async function loadExcel(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  try{
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, {type:"array"});
    const ws = wb.Sheets["商品資料"];
    if(!ws){
      setStatus("找不到工作頁「商品資料」。", "ng");
      return;
    }
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false});
    masterRows = [];
    for(let i=1;i<rows.length;i++){
      const r = rows[i] || [];
      const category = clean(r[0]);    // A
      const product = clean(r[2]);     // C
      const barcodeBase = clean(r[3]); // D
      const kcal = normalizeKcal(clean(r[4])); // E
      const price = normalizePrice(clean(r[5])); // F
      const oneDays = clean(r[6]);     // G
      const oneTime = clean(r[7]);     // H
      const twoDays = clean(r[8]);     // I
      const twoTime = clean(r[9]);     // J
      if(!category || !product) continue;
      masterRows.push({
        category, product, barcodeBase, kcal, price, oneDays, oneTime, twoDays, twoTime,
        nameKeywords: buildNameKeywords(product)
      });
    }
    populateCategories();
    saveMasterCache(file.name);
    qs("excelStatus").innerText = "已載入";
    setStatus(`Excel 已載入，共 ${masterRows.length} 筆商品。`, "ok");
  }catch(err){
    console.error(err);
    setStatus("Excel 讀取失敗。", "ng");
  }
}
function clean(v){
  if(v === undefined || v === null) return "";
  return String(v).replace(/\n/g," ").trim();
}
function normalizePrice(v){
  const digits = String(v||"").replace(/[^\d]/g,"");
  return digits ? digits + "元" : "";
}
function normalizeKcal(v){
  const digits = String(v||"").replace(/[^\d]/g,"");
  return digits ? digits + "kcal" : "";
}
function buildNameKeywords(product){
  const raw = product.replace(/[()（）\-]/g," ");
  const keys = [];
  const seeds = ["飯糰","圓","鮪魚","肉鬆","台式","雞肉飯","雙蔬","鮭魚","明太子","林聰明","御選"];
  for(const s of seeds){
    if(raw.includes(s)) keys.push(s);
  }
  if(!keys.length){
    keys.push(product.slice(0,2), product.slice(-2));
  }
  return [...new Set(keys)].filter(Boolean);
}

function saveMasterCache(fileName){
  try{
    localStorage.setItem(MASTER_STORAGE_KEY, JSON.stringify(masterRows));
    localStorage.setItem(MASTER_INFO_KEY, JSON.stringify({
      fileName: fileName || "未命名主檔",
      savedAt: new Date().toLocaleString(),
      count: masterRows.length
    }));
    renderMasterInfo();
  }catch(e){
    console.error(e);
  }
}
function loadCachedMaster(){
  try{
    const raw = localStorage.getItem(MASTER_STORAGE_KEY);
    if(!raw) return;
    const parsed = JSON.parse(raw);
    if(!Array.isArray(parsed) || !parsed.length) return;
    masterRows = parsed;
    populateCategories();
    qs("excelStatus").innerText = "已載入快取";
    renderMasterInfo();
    setStatus(`已自動載入上次主檔，共 ${masterRows.length} 筆商品。`, "ok");
  }catch(e){
    console.error(e);
  }
}
function renderMasterInfo(){
  const infoRaw = localStorage.getItem(MASTER_INFO_KEY);
  if(!infoRaw){
    qs("excelInfo").innerText = "";
    return;
  }
  try{
    const info = JSON.parse(infoRaw);
    qs("excelInfo").innerText = `主檔：${info.fileName || "未命名"}｜保存時間：${info.savedAt || "-"}｜筆數：${info.count || 0}`;
  }catch(e){
    qs("excelInfo").innerText = "";
  }
}
function clearMasterCache(){
  localStorage.removeItem(MASTER_STORAGE_KEY);
  localStorage.removeItem(MASTER_INFO_KEY);
  masterRows = [];
  qs("category").innerHTML = "";
  qs("product").innerHTML = "";
  qs("expectedSummary").innerText = "";
  qs("excelStatus").innerText = "未載入";
  qs("rowStatus").innerText = "未選擇";
  qs("excelInfo").innerText = "";
  setStatus("已清除主檔快取。", "ok");
}

function populateCategories(){
  const categories = [...new Set(masterRows.map(r=>r.category))];
  qs("category").innerHTML = categories.map(c=>`<option value="${c}">${c}</option>`).join("");
  updateProducts();
}
function updateProducts(){
  const category = qs("category").value;
  const rows = masterRows.filter(r=>r.category===category);
  qs("product").innerHTML = rows.map(r=>`<option value="${r.product}">${r.product}</option>`).join("");
  renderExpected();
}
function getSelectedRow(){
  const category = qs("category").value;
  const product = qs("product").value;
  return masterRows.find(r=>r.category===category && r.product===product);
}
function formatDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}.${m}.${day}`;
}
function getDayOfYear(d){
  const start = new Date(d.getFullYear(), 0, 1);
  const diff = d - start;
  return String(Math.floor(diff / 86400000) + 1).padStart(3,'0');
}
function getExpected(){
  const row = getSelectedRow();
  if(!row) return null;
  const now = new Date();
  const mfg = formatDate(now);
  const isOne = qs("delivery").value === "一配";
  const validDaysRaw = isOne ? row.oneDays : row.twoDays;
  const validTime = isOne ? row.oneTime : row.twoTime;
  const validDays = /^\d+$/.test(String(validDaysRaw)) ? Number(validDaysRaw) : null;
  const exp = new Date(now);
  if(validDays !== null) exp.setDate(exp.getDate() + validDays);
  const expDate = validDays !== null ? formatDate(exp) : "";
  const doy = getDayOfYear(now);
  const deliveryCode = isOne ? "3" : "6";
  const barcodePrefix12 = row.barcodeBase ? (String(row.barcodeBase).padStart(8,'0').slice(0,8) + doy + deliveryCode) : "";

  return {
    name: row.product,
    price: row.price,
    kcal: row.kcal,
    mfgDate: mfg,
    expDate,
    expTime: validTime,
    barcodeBase: row.barcodeBase,
    barcodePrefix12,
    nameKeywords: row.nameKeywords
  };
}
function renderExpected(){
  const ex = getExpected();
  if(!ex){
    qs("expectedSummary").innerText = "";
    qs("rowStatus").innerText = "未選擇";
    return;
  }
  qs("rowStatus").innerText = "已選擇";
  qs("expectedSummary").innerText =
    `品名：${ex.name}｜熱量：${ex.kcal || "X"}｜售價：${ex.price}｜製造日期：${ex.mfgDate}｜有效日期：${ex.expDate || "X"}｜有效時間：${ex.expTime || "X"}｜條碼基碼：${ex.barcodeBase || "X"}｜條碼前12碼：${ex.barcodePrefix12 || "X"}`;
}
function setStatus(text, cls){
  const s = qs("status");
  s.className = "status " + cls;
  s.innerText = text;
}

function normalizeText(t){
  return String(t||"")
    .replace(/\s+/g,"")
    .replace(/[：:]/g,"")
    .toLowerCase();
}
function extractPrice(text){
  const s = String(text||"");
  const m = s.match(/(\d{1,3})\s*元/);
  if(m) return m[1] + "元";
  return "";
}
function extractKcal(text){
  const s = String(text||"");
  let m = s.match(/\d{2,4}\s*kcal/i);
  if(m) return m[0].replace(/\s+/g,"").toLowerCase();

  m = s.match(/熱量[^0-9]{0,6}(\d{2,4})/i);
  if(m) return m[1] + "kcal";

  const lines = s.split(/\n+/).map(x=>x.trim()).filter(Boolean);
  for(const line of lines){
    if(/元/.test(line)) continue;
    if(/熱量|kcal/i.test(line)){
      const d = (line.match(/\d{2,4}/) || [])[0];
      if(d) return d + "kcal";
    }
  }

  // fallback: choose a 2-4 digit number that is not the price
  const nums = s.match(/\d{2,4}/g) || [];
  if(nums.length){
    const candidate = nums.find(n => Number(n) >= 50 && Number(n) <= 999);
    if(candidate) return candidate + "kcal";
  }
  return "";
}
function extractDates(text){
  return String(text||"").match(/\d{4}[.\/-]\d{2}[.\/-]\d{2}/g) || [];
}
function extractTime(text){
  const m = String(text||"").match(/\d{2}時/);
  return m ? m[0] : "";
}
function scoreKeywordMatch(text, keywords){
  const normalized = normalizeText(text);
  let hit = 0;
  for(const k of keywords){
    if(normalized.includes(normalizeText(k))) hit++;
  }
  return hit;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function renderRows(rows){
  qs("resultBody").innerHTML = rows.map(r => `
    <tr>
      <td>${r.label}</td>
      <td class="mono">${escapeHtml(r.actual || "(未抓到)")}</td>
      <td class="mono">${escapeHtml(r.expected || "-")}</td>
      <td>${r.ok ? "✅" : "❌"}</td>
    </tr>`).join("");
}
function loadDemo(){
  const ex = getExpected();
  if(!ex){
    setStatus("請先載入 Excel 並選品名。", "warn");
    return;
  }
  qs("barcodeInput").value = ex.barcodePrefix12 + "7";
  qs("lensText").value =
`${ex.name}
${ex.kcal}
${ex.price}
製造日期 ${ex.mfgDate}
有效日期 ${ex.expDate} ${ex.expTime}`;
  setStatus("已載入示範文字，可以直接按比對。", "ok");
}
function compareText(){
  const ex = getExpected();
  if(!ex){
    setStatus("請先載入 Excel 並選擇品名。", "warn");
    return;
  }
  const barcodeInput = String(qs("barcodeInput").value || "").replace(/\D/g,"");
  const lensText = qs("lensText").value || "";

  const dates = extractDates(lensText).map(x=>x.replace(/[\/-]/g,'.'));
  const mfgDate = dates[0] || "";
  const expDate = dates[1] || "";
  const timeVal = extractTime(lensText);
  const priceVal = extractPrice(lensText);
  const kcalVal = extractKcal(lensText);
  const nameScore = scoreKeywordMatch(lensText, ex.nameKeywords);
  const nameOk = nameScore >= Math.max(1, Math.ceil(ex.nameKeywords.length * 0.5));
  const barcodeOk = barcodeInput.slice(0,12) === ex.barcodePrefix12;

  const rows = [
    {label:"品名", actual:lensText.split(/\n/).slice(0,2).join(" / "), expected:ex.name, ok:nameOk},
    {label:"條碼", actual:barcodeInput, expected:ex.barcodePrefix12 + "X", ok:barcodeOk},
    {label:"熱量", actual:kcalVal, expected:ex.kcal, ok:normalizeText(kcalVal) === normalizeText(ex.kcal)},
    {label:"售價", actual:priceVal, expected:ex.price, ok:normalizeText(priceVal) === normalizeText(ex.price)},
    {label:"製造日期", actual:mfgDate, expected:ex.mfgDate, ok:mfgDate === ex.mfgDate},
    {label:"有效日期", actual:expDate, expected:ex.expDate, ok:expDate === ex.expDate},
    {label:"有效時間", actual:timeVal, expected:ex.expTime, ok:normalizeText(timeVal) === normalizeText(ex.expTime)}
  ];
  renderRows(rows);

  qs("parseDetail").innerText =
    `【貼上全文】\n${lensText || "(空白)"}\n\n` +
    `【價格】 ${priceVal || "(未抓到)"}\n` +
    `【熱量】 ${kcalVal || "(未抓到)"}\n` +
    `【日期1】 ${mfgDate || "(未抓到)"}\n` +
    `【日期2】 ${expDate || "(未抓到)"}\n` +
    `【時間】 ${timeVal || "(未抓到)"}\n` +
    `【條碼前12碼】 ${barcodeInput.slice(0,12) || "(未抓到)"}\n` +
    `【品名關鍵字命中】 ${nameScore}/${ex.nameKeywords.length}`;

  const failed = rows.filter(r=>!r.ok).map(r=>r.label);
  const resultStatus = failed.length ? ("NG：" + failed.join("、")) : "OK";
  lastResult = {
    time: new Date().toLocaleString(),
    category: qs("category").value,
    product: ex.name,
    delivery: qs("delivery").value,
    status: resultStatus,
    barcode: barcodeInput,
    kcal: kcalVal,
    price: priceVal,
    mfgDate: mfgDate,
    expDate: expDate,
    expTime: timeVal
  };
  if(failed.length){
    setStatus("❌ NG： " + failed.join("、"), "ng");
  }else{
    setStatus("✅ OK", "ok");
  }
}


function clearLensText(){
  qs("lensText").value = "";
  setStatus("已清除貼上文字。", "ok");
}

function getStoredResults(){
  try{
    return JSON.parse(localStorage.getItem(RESULT_STORAGE_KEY) || "[]");
  }catch(e){
    return [];
  }
}
function loadHistory(){
  const rows = getStoredResults();
  qs("historyBody").innerHTML = rows.slice(0,20).map(r => `
    <tr>
      <td>${escapeHtml(r.time)}</td>
      <td>${escapeHtml(r.product)}</td>
      <td>${escapeHtml(r.delivery)}</td>
      <td>${escapeHtml(r.status)}</td>
    </tr>`).join("");
}
function saveResult(){
  if(!lastResult){
    setStatus("請先完成一次比對。", "warn");
    return;
  }
  const rows = getStoredResults();
  rows.unshift(lastResult);
  localStorage.setItem(RESULT_STORAGE_KEY, JSON.stringify(rows));
  loadHistory();
  setStatus("已儲存結果到本機。", "ok");
}
function exportCsv(){
  const rows = getStoredResults();
  if(!rows.length){
    setStatus("目前沒有可匯出的紀錄。", "warn");
    return;
  }
  const headers = ["time","category","product","delivery","status","barcode","kcal","price","mfgDate","expDate","expTime"];
  const csv = [
    headers.join(","),
    ...rows.map(r => headers.map(h => {
      const val = String(r[h] ?? "").replace(/"/g,'""');
      return `"${val}"`;
    }).join(","))
  ].join("\\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "label_check_results.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}


init();
</script>
</body>
</html>
